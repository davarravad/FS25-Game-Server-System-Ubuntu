services:
  web:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: fsg-panel-web
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: ${APP_ENV}
      APP_URL: ${APP_URL}
      APP_KEY: ${APP_KEY}
      SESSION_SECRET: ${SESSION_SECRET}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      AGENT_URL: ${AGENT_URL}
      AGENT_SHARED_TOKEN: ${AGENT_SHARED_TOKEN}
      SHARED_GAME_PATH: ${SHARED_GAME_PATH}
      SHARED_DLC_PATH: ${SHARED_DLC_PATH}
      SHARED_INSTALLER_PATH: ${SHARED_INSTALLER_PATH}
      ADMIN_DEFAULT_USERNAME: ${ADMIN_DEFAULT_USERNAME}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD}
      ADMIN_SFTP_PORT: ${ADMIN_SFTP_PORT}
      ADMIN_SFTP_USERNAME: ${ADMIN_SFTP_USERNAME}
      ADMIN_SFTP_PASSWORD: ${ADMIN_SFTP_PASSWORD}
      INSTANCE_BASE_PATH: ${INSTANCE_BASE_PATH}
      BACKUP_BASE_PATH: ${BACKUP_BASE_PATH}
      TZ: ${TZ}
    volumes:
      - ./app/web:/var/www/html
    depends_on:
      - db
      - agent
    networks:
      - panel

  nginx:
    image: nginx:1.27-alpine
    container_name: fsg-panel-nginx
    restart: unless-stopped
    ports:
      - "${PANEL_PORT}:80"
    volumes:
      - ./app/web:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - panel

  db:
    image: mariadb:11.8
    container_name: fsg-panel-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: ${TZ}
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - panel

  agent:
    build:
      context: .
      dockerfile: docker/agent/Dockerfile
    container_name: fsg-panel-agent
    restart: unless-stopped
    environment:
      AGENT_SHARED_TOKEN: ${AGENT_SHARED_TOKEN}
      INSTANCE_BASE_PATH: ${INSTANCE_BASE_PATH}
      BACKUP_BASE_PATH: ${BACKUP_BASE_PATH}
      SHARED_GAME_PATH: ${SHARED_GAME_PATH}
      SHARED_DLC_PATH: ${SHARED_DLC_PATH}
      SHARED_INSTALLER_PATH: ${SHARED_INSTALLER_PATH}
      FS25_RUNTIME_IMAGE: ${FS25_RUNTIME_IMAGE:-fsg/fs25-runtime:local}
      FS25_RUNTIME_SOURCE: /app/fs25-runtime
      FS25_RUNTIME_RELEASETAG: ${FS25_RUNTIME_RELEASETAG:-local}
      FS25_RUNTIME_TARGETARCH: ${FS25_RUNTIME_TARGETARCH:-amd64}
      HOST_FIREWALL_MODE: ${HOST_FIREWALL_MODE:-auto}
      HOST_FIREWALL_HELPER_IMAGE: ${HOST_FIREWALL_HELPER_IMAGE:-ubuntu:24.04}
      TZ: ${TZ}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt:/opt
      - ${INSTANCE_BASE_PATH}:${INSTANCE_BASE_PATH}
      - ${BACKUP_BASE_PATH}:${BACKUP_BASE_PATH}
      - ${SHARED_GAME_PATH}:${SHARED_GAME_PATH}
      - ${SHARED_DLC_PATH}:${SHARED_DLC_PATH}
      - ${SHARED_INSTALLER_PATH}:${SHARED_INSTALLER_PATH}
      - ./docker/fs25-runtime:/app/fs25-runtime:ro
      - ./templates:/app/templates:ro
      - ./scripts:/app/scripts:ro
    networks:
      - panel

  admin-sftp:
    image: atmoz/sftp:alpine
    container_name: fsg-panel-admin-sftp
    restart: unless-stopped
    command: "${ADMIN_SFTP_USERNAME}:${ADMIN_SFTP_PASSWORD}:1000:1000:panel"
    ports:
      - "${ADMIN_SFTP_PORT}:22"
    volumes:
      - /opt:/home/${ADMIN_SFTP_USERNAME}/panel/opt
      - ${INSTANCE_BASE_PATH}:/home/${ADMIN_SFTP_USERNAME}/panel/instances
      - ${BACKUP_BASE_PATH}:/home/${ADMIN_SFTP_USERNAME}/panel/backups
      - ${SHARED_GAME_PATH}:/home/${ADMIN_SFTP_USERNAME}/panel/shared/game
      - ${SHARED_DLC_PATH}:/home/${ADMIN_SFTP_USERNAME}/panel/shared/dlc
      - ${SHARED_INSTALLER_PATH}:/home/${ADMIN_SFTP_USERNAME}/panel/shared/installer
    networks:
      - panel

volumes:
  db_data:

networks:
  panel:
    driver: bridge
